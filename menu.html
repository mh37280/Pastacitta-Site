<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pastacitta Menu | Halal Italian Kitchen</title>
    <meta
      name="description"
      content="Browse the full Pastacitta menu with starters, salads, pizza, pasta sauces, risotto, halal mains, desserts, and sides."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="menu-page">
    <main>
      <section
        class="hero-scroll hero-scroll-menu"
        id="menu-top"
        style="--hero-image: url('https://images.unsplash.com/photo-1552566626-52f8b828add9?auto=format&fit=crop&w=1800&q=80')"
      >
        <div class="hero-pin">
          <div class="hero-media"></div>
          <div class="hero-overlay"></div>

          <div class="hero-content-shell">
            <header class="topbar hero-topbar">
              <a class="brand brand-light" href="./index.html#home" aria-label="Pastacitta home">
                <span class="brand-mark">
                  <img src="./img/Logo.jpg" alt="Pastacitta logo" />
                </span>
              </a>

              <nav class="topnav topnav-light" aria-label="Primary navigation">
                <a href="./index.html#home">Home</a>
                <a href="./menu.html" class="is-current">Menu</a>
                <a href="./index.html#about">About</a>
                <a href="./index.html#visit">Visit</a>
                <a href="./index.html#contact">Contact</a>
              </nav>

              <a class="topbar-phone" href="tel:+61280688842" aria-label="Call 02 8068 8842">
                <span class="phone-green">02</span> 8068 <span class="phone-red">8842</span>
              </a>
            </header>

            <div class="hero-text-stage hero-text-stage-menu">
              <div class="hero-panel hero-panel-main" data-hero-panel>
                <p class="eyebrow eyebrow-light">Pastacitta full menu</p>
                <h1>Menu</h1>
                <p class="hero-subtitle hero-subtitle-narrow">
                  Starters, salads, pizza, pasta sauces, risotto, halal mains, combos, desserts, and sides in a layout that feels like part of the site, not a poster upload.
                </p>
              </div>
            </div>

            <a class="scroll-indicator" href="#menu-intro" aria-label="Scroll to full menu">
              <span></span>
            </a>
          </div>
        </div>
      </section>

      <div class="menu-sticky-bar">
        <div class="page-shell">
          <nav class="menu-category-nav" id="menu-category-nav" aria-label="Menu section navigation"></nav>
        </div>
      </div>

      <div class="page-shell page-shell-menu">
        <section class="menu-sections" id="menu-sections"></section>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
